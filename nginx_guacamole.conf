# Nginx 리버스 프록시 설정 (Guacamole → 443)
# 기존 Nginx 설정 파일에 추가

# WebSocket 프록시용 upstream
upstream guacamole_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    # Guacamole 리버스 프록시
    location /guacamole/ {
        proxy_pass http://guacamole_backend/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;

        # WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # 전달할 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket 전용 프록시 (Guacamole WebSocket)
    location /guacamole/websocket-tunnel {
        proxy_pass http://guacamole_backend/guacamole/websocket-tunnel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # 기본 페이지 (선택사항)
    location / {
        return 301 /guacamole/;
    }
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;
    return 301 https://$host$request_uri;
}
