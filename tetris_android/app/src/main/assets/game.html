<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;overflow:hidden}
.game-container{display:flex;gap:20px;align-items:flex-start;padding:10px}
.board-wrap{position:relative}
canvas#board{display:block;background:#0f0f23;border:2px solid #4a4a8a;border-radius:4px}
.sidebar{display:flex;flex-direction:column;gap:20px;min-width:100px}
.panel{background:#16213e;border:2px solid #4a4a8a;border-radius:4px;padding:12px;text-align:center}
.panel h3{color:#aaa;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
canvas#next{display:block;margin:0 auto;background:#0f0f23;border-radius:2px}
.score-text{color:#fff;font-size:28px;font-weight:bold}
.controls{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.controls .row{display:flex;gap:8px;justify-content:center}
.ctrl-btn{width:64px;height:64px;border-radius:12px;border:none;font-size:28px;background:#2a2a5e;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:background .15s}
.ctrl-btn:active{background:#4a4a8e}
.ctrl-btn.wide{width:136px}
.game-over-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;flex-direction:column;border-radius:4px;z-index:10}
.game-over-overlay.show{display:flex}
.game-over-overlay h1{color:#e94560;font-size:36px;margin-bottom:10px}
.game-over-overlay p{color:#fff;font-size:18px;margin-bottom:20px}
.game-over-overlay button{padding:12px 40px;font-size:18px;border:none;border-radius:8px;background:#e94560;color:#fff;cursor:pointer;touch-action:manipulation}

@media(max-width:500px){
.game-container{gap:10px;padding:5px}
.sidebar{min-width:70px}
.panel{padding:8px}
.score-text{font-size:20px}
.panel h3{font-size:11px}
.ctrl-btn{width:52px;height:52px;font-size:22px}
.ctrl-btn.wide{width:112px}
}
</style>
</head>
<body>
<div class="game-container">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="game-over-overlay" id="gameOver">
      <h1>GAME OVER</h1>
      <p>Score: <span id="finalScore">0</span></p>
      <button id="restartBtn">RESTART</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <h3>Next</h3>
      <canvas id="next"></canvas>
    </div>
    <div class="panel">
      <h3>Score</h3>
      <div class="score-text" id="scoreDisplay">0</div>
    </div>
    <div class="controls">
      <div class="row">
        <button class="ctrl-btn" id="btnLeft">&#9664;</button>
        <button class="ctrl-btn" id="btnRotate">&#x21BB;</button>
        <button class="ctrl-btn" id="btnRight">&#9654;</button>
      </div>
      <div class="row">
        <button class="ctrl-btn wide" id="btnDrop">&#9660;</button>
      </div>
    </div>
  </div>
</div>

<script>
const COLS=10,ROWS=20;
const CELL_SIZE=30;

const SHAPES=[
  {shape:[[1,1,1,1]], color:'#00f0f0'},
  {shape:[[1,1],[1,1]], color:'#f0f000'},
  {shape:[[0,1,0],[1,1,1]], color:'#a000f0'},
  {shape:[[0,1,1],[1,1,0]], color:'#00f000'},
  {shape:[[1,1,0],[0,1,1]], color:'#f00000'},
  {shape:[[1,0,0],[1,1,1]], color:'#0000f0'},
  {shape:[[0,0,1],[1,1,1]], color:'#f0a000'}
];

const boardCanvas=document.getElementById('board');
const ctx=boardCanvas.getContext('2d');
const nextCanvas=document.getElementById('next');
const nctx=nextCanvas.getContext('2d');

let board,score,gameOver;
let current,nextPiece;
let dropCounter=0;
const DROP_INTERVAL=20;

function resize(){
  const maxW=window.innerWidth-190;
  const maxH=window.innerHeight-40;
  let cw=COLS*CELL_SIZE,ch=ROWS*CELL_SIZE;
  const scale=Math.min(1,maxW/cw,maxH/ch,1.5);
  cw=Math.floor(cw*scale);ch=Math.floor(ch*scale);
  boardCanvas.width=cw;boardCanvas.height=ch;
  boardCanvas.style.width=cw+'px';boardCanvas.style.height=ch+'px';
  window._cell=cw/COLS;
  window._scale=scale;
}
resize();window.addEventListener('resize',resize);

function init(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0;gameOver=false;dropCounter=0;
  current=createPiece();
  nextPiece=createPiece();
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('scoreDisplay').textContent='0';
  draw();
}

function randomPiece(){
  return SHAPES[Math.floor(Math.random()*SHAPES.length)];
}

function createPiece(){
  const t=randomPiece();
  return{
    shape:t.shape.map(r=>[...r]),
    x:Math.floor((COLS-t.shape[0].length)/2),
    y:0,
    color:t.color
  };
}

function valid(shape,px,py){
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[0].length;c++){
      if(!shape[r][c])continue;
      const cx=px+c,cy=py+r;
      if(cx<0||cx>=COLS||cy>=ROWS)return false;
      if(cy>=0&&board[cy][cx])return false;
    }
  }
  return true;
}

function lock(){
  const p=current;
  for(let r=0;r<p.shape.length;r++)
    for(let c=0;c<p.shape[0].length;c++)
      if(p.shape[r][c]){
        const cy=p.y+r,cx=p.x+c;
        if(cy>=0)board[cy][cx]=p.color;
      }
  clearLines();
  current=nextPiece;
  nextPiece=createPiece();
  if(!valid(current.shape,current.x,current.y)){
    gameOver=true;
    document.getElementById('finalScore').textContent=score;
    document.getElementById('gameOver').classList.add('show');
  }
  draw();
}

function clearLines(){
  const newBoard=board.filter(row=>row.some(c=>c===0));
  const cleared=ROWS-newBoard.length;
  score+=cleared*100;
  document.getElementById('scoreDisplay').textContent=score;
  board=[...Array.from({length:cleared},()=>Array(COLS).fill(0)),...newBoard];
}

function move(dx,dy){
  if(gameOver)return;
  const p=current;
  if(valid(p.shape,p.x+dx,p.y+dy)){
    p.x+=dx;p.y+=dy;
  }else if(dy===1){
    lock();
  }
  draw();
}

function rotatePiece(){
  if(gameOver)return;
  const p=current;
  const shape=p.shape[0].map((_,i)=>p.shape.map(r=>r[i]).reverse());
  if(valid(shape,p.x,p.y)){
    p.shape=shape;
    draw();
  }
}

function hardDrop(){
  if(gameOver)return;
  const p=current;
  while(valid(p.shape,p.x,p.y+1))p.y++;
  lock();
  draw();
}

function draw(){
  const c=ctx,cw=boardCanvas.width,ch=boardCanvas.height,cs=window._cell;
  c.clearRect(0,0,cw,ch);

  for(let r=0;r<ROWS;r++)
    for(let col=0;col<COLS;col++){
      const x=col*cs,y=r*cs;
      c.fillStyle=board[r][col]||'#0f0f23';
      c.fillRect(x,y,cs,cs);
      c.strokeStyle='#1a1a3e';
      c.lineWidth=0.5;
      c.strokeRect(x,y,cs,cs);
    }

  if(current&&!gameOver){
    const p=current;
    for(let r=0;r<p.shape.length;r++)
      for(let col=0;col<p.shape[0].length;col++)
        if(p.shape[r][col]){
          const x=(p.x+col)*cs,y=(p.y+r)*cs;
          c.fillStyle=p.color;
          c.fillRect(x,y,cs,cs);
          c.strokeStyle='rgba(255,255,255,0.2)';
          c.lineWidth=1;
          c.strokeRect(x,y,cs,cs);
        }
  }

  const nsz=Math.min(nextCanvas.width,nextCanvas.height)/5;
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  if(nextPiece){
    const sh=nextPiece.shape;
    const rows=sh.length,cols=sh[0].length;
    const ox=(nextCanvas.width-cols*nsz)/2;
    const oy=(nextCanvas.height-rows*nsz)/2;
    for(let r=0;r<rows;r++)
      for(let col=0;col<cols;col++)
        if(sh[r][col]){
          nctx.fillStyle=nextPiece.color;
          nctx.fillRect(ox+col*nsz,oy+r*nsz,nsz,nsz);
          nctx.strokeStyle='rgba(255,255,255,0.2)';
          nctx.strokeRect(ox+col*nsz,oy+r*nsz,nsz,nsz);
        }
  }
}

// touch / swipe
let tx=0,ty=0;
boardCanvas.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  tx=t.clientX;ty=t.clientY;
});
boardCanvas.addEventListener('touchend',e=>{
  if(gameOver)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){rotatePiece();return}
  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?1:-1,0);
  }else{
    if(dy>0)hardDrop();
  }
});

// keyboard
document.addEventListener('keydown',e=>{
  if(gameOver&&e.key!=='r')return;
  switch(e.key){
    case 'ArrowLeft':move(-1,0);break;
    case 'ArrowRight':move(1,0);break;
    case 'ArrowDown':move(0,1);break;
    case 'ArrowUp':rotatePiece();break;
    case ' ':{e.preventDefault();hardDrop();break}
    case 'r':case 'R':init();break;
  }
});

// buttons
document.getElementById('btnLeft').addEventListener('click',()=>move(-1,0));
document.getElementById('btnRight').addEventListener('click',()=>move(1,0));
document.getElementById('btnRotate').addEventListener('click',rotatePiece);
document.getElementById('btnDrop').addEventListener('click',hardDrop);
document.getElementById('restartBtn').addEventListener('click',init);

// game loop
function update(){
  if(!gameOver){
    dropCounter++;
    if(dropCounter>=DROP_INTERVAL){
      move(0,1);
      dropCounter=0;
    }
  }
  requestAnimationFrame(update);
}

init();
update();
</script>
</body>
</html>
